<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="utf-8"/>
  <meta name="description" content="Комбиниран калкулатор за проценти, марж, ДДС, валута и магазин.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover"/>
  <title>Калкулатор</title>

  <!-- PWA Meta -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0b0f1e">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="icon" href="icon-192.png" type="image/png">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=16">
  <script defer src="main.js?v=16"></script>
  <script>
    // Дерегистрирай всички стари Service Workers
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(regs => {
        regs.forEach(reg => reg.unregister());
      });
    }
  </script>
</head>

<body>

<div id="app">
<header>
  <h1>📊 Калкулатор</h1>
</header>

<nav class="tabs">
  <button id="tab-percent" class="active" onclick="show('percent')" aria-label="Проценти">📈 Проценти</button>
  <button id="tab-vat" onclick="show('vat')" aria-label="ДДС">📦 ДДС</button>
  <button id="tab-currency" onclick="show('currency')" aria-label="Валута">💱 Валута</button>
</nav>

<!-- ═══ ПРОЦЕНТИ ═══ -->
<div id="percent" class="section active">

  <div class="card">
    <h3>💰 Надценка / Отстъпка</h3>
    <label>Базова сума</label>
    <input type="number" id="percentBase" placeholder="0.00" oninput="calcPercent()"/>
    <label>Процент</label>
    <input type="number" id="percentValue" placeholder="0" oninput="calcPercent()"/>
    <select id="percentType" onchange="calcPercent()">
      <option value="plus">+ Надценка</option>
      <option value="minus">– Отстъпка</option>
    </select>
    <div id="percentOutput" class="output"></div>
  </div>

  <div class="card">
    <h3>📐 Марж калкулатор</h3>
    <p class="card-hint">Покупна цена + желан марж % → продажна цена</p>
    <label>Покупна цена (лв)</label>
    <input type="number" id="marginCost" placeholder="0.00" oninput="calcMargin()"/>
    <label>Желан марж %</label>
    <input type="number" id="marginPct" placeholder="напр. 30" oninput="calcMargin()"/>
    <div id="marginOutput" class="output"></div>
  </div>

  <button class="btn-secondary" onclick="clearPercent()">🗑️ Изчисти</button>

</div>

<!-- ═══ ДДС ═══ -->
<div id="vat" class="section">

  <div class="card">
    <h3>🧾 Изчисли ДДС (20%)</h3>
    <label>Цена с ДДС</label>
    <input type="number" id="vatGross" placeholder="0.00" oninput="calcVatGross()"/>
    <div id="vatGrossRes" class="output"></div>
    <label>Цена без ДДС</label>
    <input type="number" id="vatNet" placeholder="0.00" oninput="calcVatNet()"/>
    <div id="vatNetRes" class="output"></div>
    <label>Само ДДС сума</label>
    <input type="number" id="vatOnly" placeholder="0.00" oninput="calcVatOnly()"/>
    <div id="vatOnlyRes" class="output"></div>
  </div>

  <div class="card">
    <h3>📦 Пакетно изчисление</h3>
    <div class="batch-mode-row">
      <span>Цените са:</span>
      <select id="batchMode" onchange="calcVatBatch()">
        <option value="gross">С ДДС</option>
        <option value="net">Без ДДС</option>
      </select>
    </div>
    <div id="vatBatchItems">
      <div class="batch-row">
        <input type="text" placeholder="Артикул" class="batch-name">
        <input type="number" placeholder="Цена" class="batch-price" oninput="calcVatBatch()">
      </div>
      <div class="batch-row">
        <input type="text" placeholder="Артикул" class="batch-name">
        <input type="number" placeholder="Цена" class="batch-price" oninput="calcVatBatch()">
      </div>
      <div class="batch-row">
        <input type="text" placeholder="Артикул" class="batch-name">
        <input type="number" placeholder="Цена" class="batch-price" oninput="calcVatBatch()">
      </div>
    </div>
    <button class="btn-secondary" onclick="addBatchRow()">+ Добави артикул</button>
    <div id="vatBatchResult" class="output"></div>
  </div>

  <button class="btn-secondary" onclick="clearVat()">🗑️ Изчисти</button>

</div>

<!-- ═══ ВАЛУТА ═══ -->
<div id="currency" class="section">
  <div class="card">
    <div class="rate-header">
      <h3>💱 Конвертор</h3>
      <span id="rateStatus" class="rate-badge">⏳ Зарежда...</span>
    </div>
    <div id="rateDisplay" class="rate-info"></div>

    <label>🇧🇬 Лева (BGN)</label>
    <input type="number" id="bgn" placeholder="0.00" oninput="convCur('bgn')"/>
    <label>🇪🇺 Евро (EUR)</label>
    <input type="number" id="eur" placeholder="0.00" oninput="convCur('eur')"/>
    <label>🇺🇸 Долар (USD)</label>
    <input type="number" id="usd" placeholder="0.00" oninput="convCur('usd')"/>

    <div style="display:flex;gap:8px;margin-top:12px">
      <button class="btn-secondary" onclick="fetchRates()" style="flex:1">🔄 Обнови USD</button>
      <button class="btn-secondary" onclick="clearCurrency()" style="flex:1">🗑️ Изчисти</button>
    </div>
  </div>
</div>


<footer>by Dimitar Kolev</footer>
</div><!-- /#app -->
</body>
</html>
